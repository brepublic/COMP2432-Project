[global]
gateway_bin = "target/debug/gateway"
dashboard_host = "127.0.0.1"
base_port = 5990
results_dir = "bench_results"
poll_interval_ms = 1000

[[scenarios]]
id = "quick_validate"
description = "Short validation scenario for throughput refactor"
warmup_secs = 3
measure_secs = 8
cooldown_secs = 2
buffer_capacity = 5000

[scenarios.sensors]
thermo_count = 2
thermo_rates_per_sec = "30 30"
accel_count = 2
accel_rates_per_sec = "30 30"
force_count = 1
force_rates_per_sec = "30"

[scenarios.http_load]
enabled = true
endpoint = "/api/latest"
concurrency = 1
timeout_ms = 1000
