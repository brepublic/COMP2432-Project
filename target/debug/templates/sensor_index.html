<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Available Sensors</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; background: #f8fafc; color: #0f172a; }
        .header { display: flex; justify-content: space-between; align-items: baseline; }
        .meta { color: #475569; }
        .card { background: #fff; border: 1px solid #d0d7de; border-radius: 10px; padding: 16px; }
        .sensor-list { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
        .chip { background: #e2e8f0; border-radius: 999px; padding: 6px 12px; font-size: 13px; }
        .chip a { text-decoration: none; color: #0f172a; }
        a { color: #0969da; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Available Sensors</h1>
        <a href="/">Back to home</a>
    </div>
    <div class="meta">Auto refresh: every 1 second</div>

    <div class="card">
        <div id="sensor-list" class="sensor-list">Loading...</div>
    </div>

    <script>
        async function refresh() {
            try {
                const response = await fetch("/api/stats", { cache: "no-store" });
                if (!response.ok) throw new Error("HTTP " + response.status);
                const data = await response.json();
                const sensors = Array.isArray(data.sensors_seen) ? data.sensors_seen : [];
                const list = document.getElementById("sensor-list");
                list.innerHTML = sensors.length
                    ? sensors.map(id => `<span class="chip"><a href="/sensor/${encodeURIComponent(id)}">${id}</a></span>`).join("")
                    : `<span class="chip">No sensors yet</span>`;
            } catch (error) {
                document.getElementById("sensor-list").innerHTML = `<span class="chip">Failed to fetch data: ${error}</span>`;
            }
        }
        refresh();
        setInterval(refresh, 1000);
    </script>
</body>
</html>
