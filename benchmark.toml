# Benchmark scenarios for gateway + dashboard.
#
# HTTP load: set `endpoints = ["/api/latest", ...]` for round-robin across paths.
# Avoid high QPS on `/api/range` — each request scans all stored frames from disk.
# Ingest gate: `min_ingest_ratio` (under [scenarios.thresholds]) compares measure-phase
# pushed_total delta to expected readings (sum of sensor rates × measure_secs). Use 0.0 to disable.

[global]
gateway_bin = "target/release/gateway"
dashboard_host = "127.0.0.1"
base_port = 5900
results_dir = "bench_results"
poll_interval_ms = 1000

[[scenarios]]
id = "baseline"
description = "Functional baseline with light HTTP load"
warmup_secs = 20
measure_secs = 120
cooldown_secs = 10
buffer_capacity = 5000

[scenarios.sensors]
thermo_count = 2
thermo_rates_per_sec = "50 30"
accel_count = 2
accel_rates_per_sec = "50 50"
force_count = 1
force_rates_per_sec = "50"

[scenarios.http_load]
enabled = true
endpoint = "/api/latest"
endpoints = ["/api/latest", "/api/stats", "/api/sensor/thermo-1"]
concurrency = 1
timeout_ms = 1000

[scenarios.thresholds]
min_ingest_ratio = 0.75

[[scenarios]]
id = "data_loss_normal"
description = "Data loss verification under normal sustained load"
warmup_secs = 20
measure_secs = 180
cooldown_secs = 10
buffer_capacity = 6000

[scenarios.sensors]
thermo_count = 4
thermo_rates_per_sec = "20 20 20 20"
accel_count = 4
accel_rates_per_sec = "20 20 20 20"
force_count = 4
