[sensors]
thermo_count = 2
thermo_rates_per_sec = "50 30"
accel_count = 2
accel_rates_per_sec = "50 50"
force_count = 1
force_rates_per_sec = "50"

[buffer]
# SharedBuffer capacity (number of readings).
capacity = 5000

[sensor_internal_buffer]
# Internal per-sensor queue (sensor_sim ring): usable slots and near-full warning ratio.
usable_capacity = 127
near_full_ratio = 0.85

[dashboard]
addr = "127.0.0.1:5800"

