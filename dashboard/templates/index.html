<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Sensor Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; background: #f8fafc; color: #0f172a; }
        .card { background: #fff; border: 1px solid #d0d7de; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
        ul { margin: 8px 0 0 20px; }
        li { margin: 6px 0; }
        a { color: #0969da; }
        .muted { color: #64748b; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sensor Dashboard</h1>
        <div class="muted">Auto refresh is enabled on live pages.</div>
    </div>

    <div class="card">
        <h2>Live pages</h2>
        <ul>
            <li><a href="/latest">/latest</a> - latest aggregated frames</li>
            <li><a href="/stats">/stats</a> - overall statistics</li>
            <li><a href="/sensor">/sensor</a> - list of available sensors</li>
        </ul>
    </div>

    <div class="card">
        <h2>JSON APIs</h2>
        <ul>
            <li><code>/api/latest</code></li>
            <li><code>/api/stats</code></li>
            <li><code>/api/buffer</code></li>
            <li><code>/api/sensor/&lt;id&gt;</code></li>
        </ul>
    </div>
</body>
</html>
